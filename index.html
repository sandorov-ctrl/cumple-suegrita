<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti, con todo mi amor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="marco-pantalla"></div>

    <div id="polvo-magico"></div>

    <div id="pantalla-inicio" class="seccion activa">
        <div class="halo-luz"></div>
        <h1 class="texto-espectacular">Para mi persona favorita</h1>
        <p class="subtitulo-elegante">Toca la flor para descubrir la magia</p>
        <img src="assets/boton-flor.png" id="btn-activar" alt="Inicio">
    </div>

    <div id="pantalla-ramo" class="seccion oculta">
        <div class="composicion-central">
            <div class="resplandor-ramo"></div>

            <div class="interior-ramo">
                <img src="assets/flor1.png" class="flor-viva" id="f1" data-id="0">
                <img src="assets/flor2.png" class="flor-viva" id="f2" data-id="1">
                <img src="assets/flor3.png" class="flor-viva" id="f3" data-id="2">
                <img src="assets/flor4.png" class="flor-viva" id="f4" data-id="3">
                <img src="assets/flor5.png" class="flor-viva" id="f5" data-id="4">
                <img src="assets/flor6.png" class="flor-viva" id="f6" data-id="5">
            </div>

            <img src="assets/ramo.png" id="papel-ramo" alt="Cono">
        </div>
        <h2 class="guia-visual">Toca cada flor...</h2>
    </div>

    <div id="pantalla-mensaje" class="overlay modal-oculto">
        <div class="hoja-gigante-contenedor">
            <img src="assets/hoja.png" class="arte-hoja" alt="Hoja">
            <div class="texto-pergamino">
                <p id="texto-regalo"></p>
                <button id="btn-volver">Guardar en el corazón</button>
            </div>
        </div>
    </div>

    <audio id="musica-fondo" src="assets/musica.mp3" loop></audio>

    <script src="script.js"></script>
</body>

</html>
