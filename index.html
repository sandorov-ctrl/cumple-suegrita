<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti, con todo mi cariño OTILIAAAAA🥳​🥳​</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* =========================================
           SISTEMA BASE Y FONDO NO-ELÁSTICO
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #000;
            /* Fondo de seguridad negro */
        }

        /* INGENIERÍA DE FONDO: Capa dedicada para evitar estiramiento */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('assets/fondo1.png');
            /* 'cover' asegura que la imagen mantenga su proporción original */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            /* Usamos transform para un movimiento suave sin lag */
            animation: derivaCosmica 40s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes derivaCosmica {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(-2%, -2%) scale(1.05);
            }

            100% {
                transform: translate(2%, 2%) scale(1);
            }
        }

        #universo-fondo,
        #atmosfera-nubes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        #universo-fondo {
            z-index: 1;
        }

        #atmosfera-nubes {
            z-index: 2;
        }

        .nube-deriva {
            position: absolute;
            opacity: 0.7;
            filter: drop-shadow(0 5px 15px rgba(255, 255, 255, 0.4));
            animation: derivaAtm linear infinite;
        }

        @keyframes derivaAtm {
            from {
                transform: translateX(-150px);
            }

            to {
                transform: translateX(110vw);
            }
        }

        .luciernaga {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.8);
            animation: flotarLuz linear infinite;
        }

        @keyframes flotarLuz {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
                filter: drop-shadow(0 0 10px white);
            }

            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .seccion {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 1s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .oculta {
            opacity: 0;
            z-index: -1;
            pointer-events: none;
        }

        .activa {
            opacity: 1;
            z-index: 10;
        }

        /* =========================================
           PANTALLA DE INICIO
           ========================================= */
        .plataforma-nube {
            position: relative;
            width: 90vw;
            max-width: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: flotarPlataforma 5s ease-in-out infinite alternate;
            z-index: 20;
        }

        @keyframes flotarPlataforma {
            from {
                transform: translateY(-12px);
            }

            to {
                transform: translateY(12px);
            }
        }

        .nube-fondo-inicio {
            width: 100%;
            height: auto;
            opacity: 0.95;
            filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.3));
            transform: scale(1.8);
        }

        .contenido-nube {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 2;
        }

        .titulo-bienvenida {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #b57c7c;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.9);
            line-height: 1.1;
        }

        #btn-activar {
            width: 160px;
            cursor: pointer;
            animation: pulsoBoton 2s infinite;
            margin: 10px 0;
            border-radius: 50%;
        }

        @keyframes pulsoBoton {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px rgba(181, 124, 124, 0.4));
            }

            50% {
                transform: scale(1.08);
                filter: drop-shadow(0 0 25px rgba(181, 124, 124, 0.8));
            }
        }

        .firma-diego {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: #5a3d3d;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.9);
            margin-top: 15px;
            animation: aparecerFirma 3s ease-in-out infinite alternate;
        }

        @keyframes aparecerFirma {
            from {
                opacity: 0.7;
                transform: translateY(0);
            }

            to {
                opacity: 1;
                transform: translateY(-3px);
            }
        }

        /* =========================================
           BALIZA DE NAVEGACIÓN (INSTRUCCIÓN FLORES)
           ========================================= */
        .instruccion-arte {
            position: absolute;
            top: 6%;
            left: 50%;
            transform: translate(-50%, -20px);
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #ffffff;
            background: rgba(181, 124, 124, 0.65);
            backdrop-filter: blur(8px);
            padding: 12px 35px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            z-index: 5;
            opacity: 0;
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.5s;
        }

        .mostrar-titulo {
            opacity: 1 !important;
            transform: translate(-50%, 0) !important;
            animation: latidoCosmico 3.5s ease-in-out infinite alternate 2s;
        }

        @keyframes latidoCosmico {
            from {
                box-shadow: 0 5px 15px rgba(181, 124, 124, 0.3);
            }

            to {
                box-shadow: 0 5px 30px rgba(181, 124, 124, 0.8);
                transform: translate(-50%, -2px);
            }
        }

        /* =========================================
           MÓDULOS DEL JARDÍN
           ========================================= */
        .flor-contenedor {
            position: absolute;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 20;
        }

        .nube-fondo {
            position: absolute;
            width: 160%;
            z-index: 1;
            opacity: 0.85;
        }

        .flor-img {
            position: relative;
            width: 100%;
            z-index: 2;
            filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.25));
            transition: transform 0.3s ease;
        }

        #f1 {
            top: 15%;
            left: 5%;
            animation: flotar1 6s infinite alternate ease-in-out;
        }

        #f2 {
            top: 20%;
            right: 5%;
            animation: flotar2 7s infinite alternate ease-in-out;
        }

        #f3 {
            top: 45%;
            left: 10%;
            animation: flotar3 5s infinite alternate ease-in-out;
        }

        #f4 {
            top: 55%;
            right: 10%;
            animation: flotar1 8s infinite alternate ease-in-out;
        }

        #f5 {
            bottom: 12%;
            left: 15%;
            animation: flotar2 6.5s infinite alternate ease-in-out;
        }

        #f6 {
            bottom: 8%;
            right: 15%;
            animation: flotar3 7.5s infinite alternate ease-in-out;
        }

        @keyframes flotar1 {
            from {
                transform: translate(0, 0) rotate(-5deg);
            }

            to {
                transform: translate(20px, 20px) rotate(5deg);
            }
        }

        @keyframes flotar2 {
            from {
                transform: translate(0, 0) rotate(5deg);
            }

            to {
                transform: translate(-20px, 25px) rotate(-5deg);
            }
        }

        @keyframes flotar3 {
            from {
                transform: translate(0, 0) rotate(-3deg);
            }

            to {
                transform: translate(15px, -20px) rotate(3deg);
            }
        }

        .flor-contenedor.enfocada {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1.3) !important;
            animation: pulsoFlorFondo 3s infinite !important;
            z-index: 100 !important;
        }

        .flor-contenedor.zoom-extremo {
            position: fixed !important;
            transform: translate(-50%, -50%) scale(2.0) !important;
            z-index: 150 !important;
        }

        @keyframes pulsoFlorFondo {

            0%,
            100% {
                filter: drop-shadow(0 0 15px rgba(255, 220, 220, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 30px rgba(255, 200, 200, 0.7));
            }
        }

        .flor-contenedor.opaca {
            opacity: 0.15;
            filter: blur(3px);
        }

        /* =========================================
           INTERFAZ DE MENSAJES (CONTENCIÓN ESTRUCTURAL)
           ========================================= */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal-oculto {
            display: none;
            opacity: 0;
        }

        .modal-activo {
            display: flex;
            opacity: 1;
            transition: opacity 0.5s;
        }

        .hoja-inmersiva-contenedor {
            position: relative;
            width: 95vw;
            max-width: 500px;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: levitacionHoja 6s ease-in-out infinite alternate;
        }

        @keyframes levitacionHoja {
            from {
                transform: translateY(-5px) rotate(-1deg);
            }

            to {
                transform: translateY(5px) rotate(1deg);
            }
        }

        .vuelo-espectacular {
            animation: entrada3D 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes entrada3D {
            0% {
                transform: translateY(300px) scale(0.2) rotateY(90deg);
                opacity: 0;
            }

            100% {
                transform: translateY(0) scale(1) rotateY(0deg);
                opacity: 1;
            }
        }

        .arte-hoja {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.6));
        }

        .bloque-texto {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65%;
            max-width: 320px;
            height: 65%;
            max-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            opacity: 0;
            transition: opacity 1s ease 1s;
            z-index: 10;
            overflow-y: auto;
            padding: 10px 5px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .bloque-texto::-webkit-scrollbar {
            display: none;
        }

        .modal-activo .bloque-texto {
            opacity: 1;
        }

        #texto-regalo {
            font-family: 'Caveat', cursive;
            font-size: 1.85rem;
            font-weight: 700;
            color: #2b1d1d;
            line-height: 1.4;
            margin-top: auto;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 1),
                0 0 20px rgba(255, 255, 255, 0.9),
                1px 1px 3px rgba(255, 255, 255, 0.8);
            transition: opacity 0.5s ease;
        }

        .firma-carta {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            color: #b57c7c;
            align-self: flex-end;
            margin-bottom: 20px;
            margin-right: 10px;
            font-weight: 700;
        }

        .botones-accion {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
            width: 100%;
            margin-bottom: auto;
        }

        #btn-volver,
        #btn-ver-flor,
        #btn-cerrar-zoom {
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        #btn-volver:hover,
        #btn-ver-flor:hover,
        #btn-cerrar-zoom:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        #btn-volver {
            background: #b57c7c;
            color: white;
        }

        #btn-ver-flor {
            background: white;
            color: #b57c7c;
            border: 2px solid #b57c7c;
        }

        #btn-cerrar-zoom {
            position: fixed;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 160;
            background: white;
            color: #b57c7c;
            border: 2px solid #b57c7c;
            display: none;
            width: auto;
            padding: 12px 25px;
        }

        /* =========================================
           INGENIERÍA RESPONSIVA (MÓVILES)
           ========================================= */
        @media (max-width: 768px) {
            .plataforma-nube {
                width: 100vw;
            }

            .nube-fondo-inicio {
                transform: scale(2.6);
            }

            .contenido-nube {
                width: 90%;
            }

            .titulo-bienvenida {
                font-size: 1.8rem;
                margin-bottom: 5px;
                padding: 0 5px;
            }

            #btn-activar {
                width: 110px;
                margin: 5px 0;
            }

            .firma-diego {
                font-size: 1.4rem;
                margin-top: 5px;
            }

            .instruccion-arte {
                font-size: 1.4rem;
                top: 8%;
                width: 85%;
            }

            .flor-contenedor {
                width: 100px;
                height: 100px;
            }

            #f1 {
                top: 15%;
                left: 5%;
            }

            #f2 {
                top: 35%;
                right: 5%;
            }

            #f3 {
                top: 55%;
                left: 5%;
            }

            #f4 {
                top: 75%;
                right: 5%;
            }

            #f5 {
                top: 95%;
                left: 5%;
            }

            #f6 {
                top: 115%;
                right: 5%;
            }

            #pantalla-jardin::after {
                content: '';
                display: block;
                position: absolute;
                top: 130%;
                height: 50px;
                width: 100%;
            }

            .flor-contenedor.enfocada {
                transform: translate(-50%, -50%) scale(1.8) !important;
            }

            .flor-contenedor.zoom-extremo {
                transform: translate(-50%, -50%) scale(2.8) !important;
            }

            .bloque-texto {
                width: 72%;
                height: 70%;
            }

            #texto-regalo {
                font-size: 1.25rem;
            }

            .firma-carta {
                font-size: 1.15rem;
            }
        }
    </style>
</head>

<body>
    <div id="universo-fondo"></div>
    <div id="atmosfera-nubes"></div>

    <div id="pantalla-inicio" class="seccion activa">
        <div class="plataforma-nube">
            <img src="assets/nube.png" class="nube-fondo-inicio" alt="Nube base">
            <div class="contenido-nube">
                <h1 class="titulo-bienvenida">Toca la flor Anelina para tu regalo</h1>
                <img src="assets/boton-flor.png" id="btn-activar" alt="Regalo">
                <p class="firma-diego">Con mucho cariño,<br>de parte de Diego</p>
            </div>
        </div>
    </div>

    <div id="pantalla-jardin" class="seccion oculta">
        <h2 class="instruccion-arte oculta-inicio" id="titulo-jardin">Toca cada flor</h2>
        <div class="flor-contenedor" id="f1" data-id="0">
            <img src="assets/nube.png" class="nube-fondo" alt="nube"><img src="assets/flor1.png" class="flor-img"
                alt="flor">
        </div>
        <div class="flor-contenedor" id="f2" data-id="1">
            <img src="assets/nube.png" class="nube-fondo" alt="nube"><img src="assets/flor2.png" class="flor-img"
                alt="flor">
        </div>
        <div class="flor-contenedor" id="f3" data-id="2">
            <img src="assets/nube.png" class="nube-fondo" alt="nube"><img src="assets/flor3.png" class="flor-img"
                alt="flor">
        </div>
        <div class="flor-contenedor" id="f4" data-id="3">
            <img src="assets/nube.png" class="nube-fondo" alt="nube"><img src="assets/flor4.png" class="flor-img"
                alt="flor">
        </div>
        <div class="flor-contenedor" id="f5" data-id="4">
            <img src="assets/nube.png" class="nube-fondo" alt="nube"><img src="assets/flor5.png" class="flor-img"
                alt="flor">
        </div>
        <div class="flor-contenedor" id="f6" data-id="5">
            <img src="assets/nube.png" class="nube-fondo" alt="nube"><img src="assets/flor6.png" class="flor-img"
                alt="flor">
        </div>
        <button id="btn-cerrar-zoom">Volver al jardín</button>
    </div>

    <div id="pantalla-mensaje" class="overlay modal-oculto">
        <div class="hoja-inmersiva-contenedor">
            <img src="assets/hoja.png" class="arte-hoja" alt="Hoja">
            <div class="bloque-texto">
                <p id="texto-regalo"></p>
                <span class="firma-carta">- Diego</span>
                <div class="botones-accion">
                    <button id="btn-volver">Cerrar carta</button>
                    <button id="btn-ver-flor">Ver flor en detalle</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="musica-fondo" src="assets/musica.m4a" loop></audio>

    <script>
        const frasesUnicas = [
            "Más allá de los detalles o la comida, lo que más disfruto es tu compañía. Gracias por abrazarme como a un hijo más.",
            "Agradezco de corazón cada consejo que me das. Me gusta escucharte porque tu energía me transmite una paz que no se encuentra en cualquier lado.",
            "Hay personas que te hacen sentir en casa sin importar dónde estés, y tú eres una de ellas. Gracias por ese cariño tan auténtico que me regalas siempre.",
            "Valoro muchísimo tu alegría y esa forma tan tuya de cuidar a los demás.",
            "Espero que pases un día genial, rodeada de amor y de las cosas que te hacen feliz. Te lo mereces muchísimo.",
            "Gracias por ser esa persona tan especial que siempre tiene un abrazo listo y una sonrisa sincera. Te quiero mucho."
        ];

        const btnActivar = document.getElementById('btn-activar');
        const pInicio = document.getElementById('pantalla-inicio');
        const pRamo = document.getElementById('pantalla-jardin');
        const tituloJardin = document.getElementById('titulo-jardin');
        const musica = document.getElementById('musica-fondo');
        const flores = document.querySelectorAll('.flor-contenedor');
        const overlay = document.getElementById('pantalla-mensaje');
        const contenedorHoja = document.querySelector('.hoja-inmersiva-contenedor');
        const textoRegalo = document.getElementById('texto-regalo');
        const btnVolver = document.getElementById('btn-volver');
        const btnVerFlor = document.getElementById('btn-ver-flor');
        const btnCerrarZoom = document.getElementById('btn-cerrar-zoom');
        const capaMagia = document.getElementById('universo-fondo');
        const capaNubes = document.getElementById('atmosfera-nubes');

        function generarPolvoMagico() {
            for (let i = 0; i < 30; i++) {
                let luz = document.createElement('div');
                luz.classList.add('luciernaga');
                let size = Math.random() * 4 + 2;
                luz.style.width = `${size}px`; luz.style.height = `${size}px`;
                luz.style.left = `${Math.random() * 100}vw`;
                luz.style.animationDuration = `${Math.random() * 10 + 5}s`;
                luz.style.animationDelay = `${Math.random() * 5}s`;
                capaMagia.appendChild(luz);
            }
        }

        function generarNubesAtmosfera() {
            for (let i = 0; i < 5; i++) {
                let nube = document.createElement('img');
                nube.src = 'assets/nube.png'; nube.classList.add('nube-deriva');
                nube.style.width = `${Math.random() * 150 + 150}px`;
                nube.style.top = `${Math.random() * 80}vh`;
                nube.style.animationDuration = `${Math.random() * 20 + 25}s`;
                nube.style.animationDelay = `${Math.random() * -30}s`;
                capaNubes.appendChild(nube);
            }
        }

        setTimeout(() => { generarPolvoMagico(); generarNubesAtmosfera(); }, 100);

        btnActivar.addEventListener('click', () => {
            musica.volume = 1.0;
            musica.play().catch(e => console.log("Audio block"));
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ff9a9e', '#fecfef', '#a1c4fd'] });
            pInicio.classList.replace('activa', 'oculta');
            pRamo.classList.replace('oculta', 'activa');
            setTimeout(() => tituloJardin.classList.add('mostrar-titulo'), 500);
        });

        flores.forEach(flor => {
            flor.addEventListener('click', () => {
                flores.forEach(f => f.classList.add('opaca'));
                flor.classList.remove('opaca'); flor.classList.add('enfocada');
                textoRegalo.textContent = frasesUnicas[flor.getAttribute('data-id')];
                setTimeout(() => {
                    overlay.classList.replace('modal-oculto', 'modal-activo');
                    contenedorHoja.classList.add('vuelo-espectacular');
                }, 600);
            });
        });

        btnVolver.addEventListener('click', () => {
            overlay.classList.replace('modal-activo', 'modal-oculto');
            contenedorHoja.classList.remove('vuelo-espectacular');
            flores.forEach(flor => { flor.classList.remove('opaca', 'enfocada', 'zoom-extremo'); });
        });

        btnVerFlor.addEventListener('click', () => {
            overlay.classList.replace('modal-activo', 'modal-oculto');
            contenedorHoja.classList.remove('vuelo-espectacular');
            btnCerrarZoom.style.display = 'block';
            const florActual = document.querySelector('.flor-contenedor.enfocada');
            if (florActual) florActual.classList.add('zoom-extremo');
        });

        btnCerrarZoom.addEventListener('click', () => {
            btnCerrarZoom.style.display = 'none';
            flores.forEach(flor => { flor.classList.remove('opaca', 'enfocada', 'zoom-extremo'); });
        });
    </script>
</body>

</html>
