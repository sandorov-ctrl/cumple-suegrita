<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños!</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="contenedor-inicio" class="activo">
        <button id="btn-magico">Toca para tu sorpresa ✨</button>
    </div>

    <div id="contenedor-ramo" class="oculto">
        <div class="centro-ramo">💐</div>
        <div class="regalo" id="regalo-1" data-id="0">🎁</div>
        <div class="regalo" id="regalo-2" data-id="1">🎁</div>
        <div class="regalo" id="regalo-3" data-id="2">🎁</div>
        <div class="regalo" id="regalo-4" data-id="3">🎁</div>
        <div class="regalo" id="regalo-5" data-id="4">🎁</div>
    </div>

    <div id="modal-mensaje" class="oculto">
        <div class="contenido-modal">
            <span id="cerrar-modal">✖</span>
            <h2 id="titulo-modal">Para ti...</h2>
            <p id="texto-modal">Aquí va el mensaje.</p>
        </div>
    </div>

    <audio id="musica-fondo" src="assets/musica.mp3"></audio>

    <script src="script.js"></script>
</body>

</html>
