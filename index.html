<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi suegra</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="pantalla-inicio" class="seccion activa">
        <h1 class="titulo-inicio">Toca la flor para comenzar</h1>
        <img src="assets/boton-flor.png" id="btn-abrir" alt="Botón Flor">
    </div>

    <div id="pantalla-ramo" class="seccion oculta">
        <div class="escenario-ramo">
            <img src="assets/ramo.png" id="base-ramo" alt="Ramo">

            <img src="assets/flor1.png" class="flor" id="flor-1" data-id="0">
            <img src="assets/flor2.png" class="flor" id="flor-2" data-id="1">
            <img src="assets/flor3.png" class="flor" id="flor-3" data-id="2">
            <img src="assets/flor4.png" class="flor" id="flor-4" data-id="3">
            <img src="assets/flor5.png" class="flor" id="flor-5" data-id="4">
            <img src="assets/flor6.png" class="flor" id="flor-6" data-id="5">
        </div>
        <p class="instruccion">Toca una flor para ver su interior</p>
    </div>

    <div id="pantalla-mensaje" class="overlay modal-oculto">
        <div class="contenedor-hoja">
            <img src="assets/hoja.png" class="hoja-animada" alt="Hoja Mensaje">
            <div class="texto-wrapper">
                <p id="texto-final"></p>
                <span id="btn-cerrar">Volver al ramo</span>
            </div>
        </div>
    </div>

    <audio id="musica-fondo" src="assets/musica.mp3" loop></audio>

    <script src="script.js"></script>
</body>

</html>
