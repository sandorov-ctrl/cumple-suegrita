<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="pantalla-inicio" class="seccion activa">
        <h1 class="titulo-bienvenida">Toca la flor para tu regalo</h1>
        <img src="assets/boton-flor.png" id="btn-activar" alt="Regalo">
    </div>

    <div id="pantalla-jardin" class="seccion oculta">
        <h2 class="subtitulo-jardin">Cada flor guarda un pensamiento para ti</h2>

        <div class="cuadrícula-flores">
            <div class="tarjeta-flor" data-id="0"><img src="assets/flor1.png" alt="Flor 1"></div>
            <div class="tarjeta-flor" data-id="1"><img src="assets/flor2.png" alt="Flor 2"></div>
            <div class="tarjeta-flor" data-id="2"><img src="assets/flor3.png" alt="Flor 3"></div>
            <div class="tarjeta-flor" data-id="3"><img src="assets/flor4.png" alt="Flor 4"></div>
            <div class="tarjeta-flor" data-id="4"><img src="assets/flor5.png" alt="Flor 5"></div>
            <div class="tarjeta-flor" data-id="5"><img src="assets/flor6.png" alt="Flor 6"></div>
        </div>
    </div>

    <div id="pantalla-mensaje" class="overlay modal-oculto">
        <div class="hoja-voladora-contenedor">
            <img src="assets/hoja.png" class="hoja-fondo" alt="Hoja">

            <div class="bloque-texto">
                <p id="texto-regalo"></p>
                <button id="btn-volver">Cerrar</button>
            </div>
        </div>
    </div>

    <audio id="musica-fondo" src="assets/musica.mp3" loop></audio>

    <script src="script.js"></script>
</body>

</html>
